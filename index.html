<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Форматер">
<title>Форматер текста</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geologica:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #0b0f1a;
  --s1:       #111827;
  --s2:       #1a2235;
  --s3:       #1e2d47;
  --b1:       #1f3054;
  --b2:       #2a4070;
  --accent:   #3b82f6;
  --accent-d: #2563eb;
  --indigo:   #6366f1;
  --text:     #c9d8f0;
  --dim:      #6b8aad;
  --muted:    #3d5475;
  --green:    #22c55e;
  --red:      #ef4444;
  --yellow:   #f59e0b;
  --sans:     'Geologica', sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --safe-t:   env(safe-area-inset-top, 0px);
  --safe-b:   env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

button { touch-action: manipulation; }

html {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
}

body {
  height: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  user-select: none;
  background-image:
    radial-gradient(ellipse 120% 40% at 50% 0%, rgba(59,130,246,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 80% 30% at 100% 100%, rgba(99,102,241,0.06) 0%, transparent 50%);
}

/* ── HEADER ─────────────────────────── */
.hdr {
  flex-shrink: 0;
  background: var(--s1);
  border-bottom: 1px solid var(--b1);
  padding: 10px 14px;
  padding-top: calc(10px + var(--safe-t));
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.hdr-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent);
}

.logo-mark {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), var(--indigo));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  box-shadow: 0 0 12px rgba(59,130,246,0.35);
}

.install-btn {
  margin-left: auto;
  display: none;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 7px;
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.4);
  color: var(--accent);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .05em;
  cursor: pointer;
  text-transform: uppercase;
}
.install-btn.visible { display: flex; }
.install-btn:active { background: rgba(59,130,246,0.25); }

.file-hdr-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: 7px;
  background: var(--s2);
  border: 1px solid var(--b1);
  color: var(--dim);
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .04em;
}
.file-hdr-btn:active { background: var(--s3); color: var(--text); }

.stats-row {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.chip {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 5px;
  padding: 2px 8px;
}
.chip b { color: var(--dim); font-weight: 500; }

/* FORMAT — категории + кнопки */
.fmt-cats {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.fmt-cats::-webkit-scrollbar { display: none; }

.fmt-cat {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--b1);
  background: var(--s2);
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.fmt-cat.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.fmt-cat:active { opacity: .8; }

.fmt-btns {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 1px;
}
.fmt-btns::-webkit-scrollbar { display: none; }

.f-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 16px;
  border-radius: 9px;
  background: var(--s2);
  border: 1px solid var(--b1);
  color: var(--dim);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s;
  min-height: 38px;
}
.f-btn:active { background: var(--s3); border-color: var(--b2); color: var(--text); transform: scale(.97); }

/* ── SYMBOLS ─────────────────────────── */
.sym-bar {
  flex-shrink: 0;
  background: var(--s1);
  border-bottom: 1px solid var(--b1);
  padding: 8px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sym-head {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
}

.sym-badge {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--s2);
  border: 1px solid var(--b2);
  border-radius: 4px;
  padding: 1px 6px;
  color: var(--dim);
}

/* Tab switcher — full width */
.sym-tabs {
  display: flex;
  gap: 0;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 10px;
  padding: 3px;
  width: 100%;
}
.sym-tab {
  flex: 1;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  padding: 8px 0;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .03em;
}
.sym-tab.active {
  background: var(--s3);
  border: 1px solid var(--b2);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.sym-tab:active { opacity: .8; }

.sym-scroll {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  min-height: 34px;
  align-items: center;
}
.sym-scroll::-webkit-scrollbar { display: none; }

.s-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  border-radius: 7px;
  background: var(--s2);
  border: 1px solid var(--b2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  cursor: pointer;
  min-height: 34px;
  transition: all .12s;
}
.s-btn:active { transform: scale(.93); }
.s-btn.gone {
  text-decoration: line-through;
  color: var(--muted);
  border-color: var(--b1);
  background: var(--s1);
  opacity: .6;
}
.s-btn.gone:active { border-color: rgba(34,197,94,.4); color: var(--green); opacity: 1; }
.s-btn.emoji-btn { font-size: 16px; }

.s-n {
  font-size: 9px;
  color: var(--muted);
  background: var(--s3);
  border-radius: 3px;
  padding: 1px 4px;
  font-family: var(--mono);
}

.sym-empty {
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
}

/* ── REPLACE PANEL ───────────────────── */
.replace-panel {
  display: none;
  flex-direction: column;
  gap: 8px;
}
.replace-panel.active { display: flex; }

.rp-field {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--s2);
  border: 1px solid var(--b2);
  border-radius: 10px;
  padding: 10px 14px;
  width: 100%;
}
.rp-field input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 15px;
  width: 100%;
  caret-color: var(--accent);
}
.rp-field input::placeholder { color: var(--muted); font-size: 13px; font-family: var(--sans); }
.rp-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  white-space: nowrap;
  width: 28px;
  flex-shrink: 0;
}
.rp-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.rp-pair-hint {
  font-size: 11px;
  color: var(--accent);
  opacity: 0;
  transition: opacity .2s;
  padding: 0 2px;
}
.rp-pair-hint.visible { opacity: 1; }
.rp-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 11px 0;
  border-radius: 10px;
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  flex: 1;
  transition: all .12s;
}
.rp-btn:active { background: var(--accent-d); transform: scale(.98); }
.rp-btn.clear-btn {
  background: transparent;
  border: 1px solid var(--b2);
  color: var(--dim);
  flex: 0 0 44px;
  font-size: 18px;
  padding: 11px 0;
}
.rp-btn.clear-btn:active { background: var(--s3); }

/* ── EDITOR ─────────────────────────── */
.editor-wrap {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

textarea {
  flex: 1;
  width: 100%;
  min-height: 0;
  background: var(--s2);
  color: var(--text);
  border: none;
  outline: none;
  resize: none;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.75;
  padding: 14px 16px;
  caret-color: var(--accent);
  -webkit-appearance: none;
  user-select: text;
  -webkit-user-select: text;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
textarea::placeholder { color: var(--muted); font-family: var(--sans); font-size: 13px; }

/* Diff pill */
.diff-pill {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(11,15,26,.88);
  border: 1px solid var(--b2);
  border-radius: 20px;
  padding: 3px 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  pointer-events: none;
  display: none;
  backdrop-filter: blur(6px);
  z-index: 5;
}
.diff-pill.pos { color: #4ade80; border-color: rgba(74,222,128,.3); }
.diff-pill.neg { color: #f87171; border-color: rgba(248,113,113,.3); }

/* File mode banner */
.file-banner {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: rgba(59,130,246,.1);
  border-bottom: 1px solid rgba(59,130,246,.25);
  font-size: 11px;
  color: var(--accent);
  flex-shrink: 0;
}
.file-banner.active { display: flex; }
.file-name { font-family: var(--mono); font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-close { cursor: pointer; opacity: .6; font-size: 16px; line-height: 1; }
.file-close:hover { opacity: 1; }

/* ── BOTTOM BAR ─────────────────────── */
.btm {
  flex-shrink: 0;
  background: var(--s1);
  border-top: 1px solid var(--b1);
  padding: 8px 10px;
  padding-bottom: calc(8px + var(--safe-b));
  display: grid;
  grid-template-columns: 1fr 1fr 1.6fr 1.6fr 1fr;
  gap: 6px;
  box-shadow: 0 -10px 40px rgba(0,0,0,.35);
}

.b-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px 4px;
  border-radius: 11px;
  background: var(--s2);
  border: 1px solid var(--b1);
  color: var(--dim);
  font-family: var(--sans);
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .12s;
  min-height: 56px;
}
.b-btn:active { transform: scale(.94); }

.b-btn.green  { color: #4ade80; border-color: rgba(74,222,128,.25); }
.b-btn.green:active  { background: rgba(34,197,94,.1); }

.b-btn.blue {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px rgba(59,130,246,.35);
}
.b-btn.blue:active { background: var(--accent-d); }

.b-btn.red   { color: #f87171; border-color: rgba(239,68,68,.25); }
.b-btn.red:active   { background: rgba(239,68,68,.1); }

/* FILE MENU */
.file-menu {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 1px solid var(--b2);
  border-radius: 20px 20px 0 0;
  padding: 16px 16px;
  padding-bottom: calc(20px + var(--safe-b));
  display: flex;
  flex-direction: column;
  gap: 8px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,1.2,.64,1);
  z-index: 50;
  box-shadow: 0 -20px 60px rgba(0,0,0,.5);
}
.file-menu.open { transform: translateY(0); }

.fm-handle {
  width: 40px; height: 4px;
  background: var(--b2);
  border-radius: 2px;
  margin: 0 auto 10px;
}

.fm-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--muted);
  padding: 0 4px;
}

.fm-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 12px;
  background: var(--s2);
  border: 1px solid var(--b1);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .12s;
  text-align: left;
}
.fm-btn:active { background: var(--s3); }
.fm-btn .fm-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.fm-btn .fm-sub { font-size: 11px; color: var(--dim); font-weight: 400; display: block; margin-top: 2px; }

.fm-btn.open-f .fm-icon  { background: rgba(59,130,246,.2);  color: var(--accent); }
.fm-btn.save-f .fm-icon  { background: rgba(34,197,94,.15);  color: var(--green); }
.fm-btn.paste-f .fm-icon { background: rgba(245,158,11,.12); color: var(--yellow); }

.fm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 40;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.fm-overlay.active { opacity: 1; pointer-events: auto; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--s3);
  border: 1px solid var(--b2);
  color: var(--text);
  padding: 9px 20px;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  transition: all .28s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* OFFLINE INDICATOR - hidden */
.offline-dot { display: none; }

</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="stats-row" id="stats-row">
      <div class="chip"><b id="sc">0</b> сим</div>
      <div class="chip"><b id="sw">0</b> сл</div>
    </div>
    <button class="install-btn" id="install-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Установить
    </button>
    <button class="file-hdr-btn" onclick="openFileMenu()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Файл
    </button>
  </div>

  <!-- FORMAT: категории -->
  <div class="fmt-cats" id="fmt-cats">
    <button class="fmt-cat active" onclick="setFmtCat('spaces',this)">Пробелы</button>
    <button class="fmt-cat" onclick="setFmtCat('register',this)">Регистр</button>
    <button class="fmt-cat" onclick="setFmtCat('punct',this)">Пунктуация</button>
    <button class="fmt-cat" onclick="setFmtCat('struct',this)">Структура</button>
  </div>
  <!-- FORMAT: кнопки выбранной категории -->
  <div class="fmt-btns" id="fmt-btns"></div>
</div>
</div>

<!-- SYMBOLS BAR -->
<div class="sym-bar">
  <div class="sym-head">
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Символы
    <span class="sym-badge" id="sym-n">0</span>
  </div>

  <!-- TAB SWITCHER — full width -->
  <div class="sym-tabs">
    <button class="sym-tab active" id="tab-detect" onclick="switchTab('detect')">Удалить</button>
    <button class="sym-tab" id="tab-replace" onclick="switchTab('replace')">Заменить</button>
  </div>

  <!-- DETECT TAB -->
  <div class="sym-scroll" id="sym-scroll">
    <span class="sym-empty">Не найдено</span>
  </div>

  <!-- REPLACE TAB -->
  <div class="replace-panel" id="replace-panel">
    <div class="rp-field">
      <span class="rp-label">что</span>
      <input id="rp-from" type="text" placeholder="символ для замены" maxlength="10" autocomplete="off" spellcheck="false">
    </div>
    <div class="rp-field">
      <span class="rp-label">на</span>
      <input id="rp-to" type="text" placeholder="чем заменить" maxlength="10" autocomplete="off" spellcheck="false">
    </div>
    <div class="rp-pair-hint" id="rp-pair-hint"></div>
    <div class="rp-row">
      <button class="rp-btn" onclick="doReplace()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Заменить
      </button>
      <button class="rp-btn clear-btn" onclick="clearReplace()" title="Очистить поля">✕</button>
    </div>
  </div>
</div>

<!-- EDITOR AREA -->
<div class="editor-wrap">
  <div class="file-banner" id="file-banner">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span class="file-name" id="file-name">—</span>
    <span class="file-close" onclick="closeFile()">✕</span>
  </div>
  <textarea id="ed"
    placeholder="Вставьте или введите текст…&#10;&#10;• Кнопки сверху — форматирование&#10;• Найденные символы появятся в строке выше&#10;• Внизу — работа с файлами и буфером обмена"
    spellcheck="false"
    autocorrect="off"
    autocapitalize="off">
  </textarea>
  <div class="diff-pill" id="diff-pill"></div>
</div>

<!-- BOTTOM BAR -->
<div class="btm">
  <button class="b-btn" onclick="doUndo()">

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// SERVICE WORKER
// ══════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════

// Словарь паттернов — порядок важен: составные до одиночных
const DICT = [
  // Заголовки
  '######','#####','####','###','##','#',
  // Жирный / курсив / горизонтальная линия
  '***','**','*','___','__','_','---',
  // Списки и цитаты
  '~~','+','1.','>','-',
  // Код
  '```','`',
  // Ссылки и медиа
  '[',']','(',')',  '!',
  // Таблицы и прочее
  '|',':','\\'
];

// Парные скобки для автозамены
const PAIRS = {
  '(': ')', ')': '(',
  '[': ']', ']': '[',
  '{': '}', '}': '{',
  '<': '>', '>': '<',
  '«': '»', '»': '«',
  '"': '"', '"': '"',
  '\u2018': '\u2019', '\u2019': '\u2018',
};
const PAIR_LABELS = {
  '(':'( … )', '[':'[ … ]', '{':'{ … }', '<':'< … >',
  '«':'« … »', '"':'" … "',
};

// Детектор эмодзи
const EMOJI_RE = /\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu;

const ed = document.getElementById('ed');
let hist = [''], hIdx = 0;
let removedSet = new Set();
let removeEmoji = false;
let originalText = '';
let currentFileName = null;
let fileHandle = null;
let currentTab = 'detect';

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function render() {
  // При обычном render — текст в поле IS the original (нет активных удалений)
  originalText = ed.value;
  removedSet.clear();
  removeEmoji = false;
  updateStats();
  if (currentTab === 'detect') renderSymbols();
}

function updateStats() {
  const t = ed.value;
  const words = t.trim() ? t.trim().split(/\s+/).length : 0;
  document.getElementById('sc').textContent = t.length;
  document.getElementById('sw').textContent = words;
  // diff pill — показываем разницу с originalText
  const diff = originalText.length - t.length;
  const pill = document.getElementById('diff-pill');
  if (diff !== 0) {
    pill.style.display = 'block';
    pill.textContent = diff > 0 ? `−${diff} симв.` : `+${Math.abs(diff)} симв.`;
    pill.className = 'diff-pill ' + (diff > 0 ? 'pos' : 'neg');
  } else {
    pill.style.display = 'none';
  }
}

// Применяет удаления с приоритетом длины (длинные → короткие)
// Каждый паттерн удаляется ТОЛЬКО как самостоятельное вхождение,
// не трогая более длинные паттерны из того же символа.
function applyRemovals(text) {
  const sorted = [...removedSet].sort((a, b) => b.length - a.length);
  sorted.forEach(pat => {
    text = removeExact(text, pat);
  });
  if (removeEmoji) {
    text = text.replace(EMOJI_RE, '');
  }
  return text;
}

// Удаляет только «точные» вхождения паттерна:
// вхождение считается точным, если символ паттерна не продолжается
// ни слева, ни справа (нет того же символа рядом).
function removeExact(text, pat) {
  const ch = pat[0]; // опорный символ (все символы паттерна одинаковы для #,*,_,-)
  const allSame = pat.split('').every(c => c === ch);

  if (!allSame) {
    // Для разнородных паттернов (~~, ```, 1., >, +, \, |, :) —
    // удаляем только если слева и справа нет того же ch
    // Используем простой split, они не могут быть «частью более длинного»
    return text.split(pat).join('');
  }

  // Для однородных паттернов (#, ##, ###, *, **, ***, _, __, ___, ---)
  // удаляем вхождение только если:
  //   - слева нет ch (или начало строки)
  //   - справа нет ch (или конец строки)
  const len = pat.length;
  let result = '';
  let i = 0;
  while (i < text.length) {
    // Проверяем совпадение с паттерном начиная с позиции i
    if (text.startsWith(pat, i)) {
      const before = i > 0 ? text[i - 1] : null;
      const after  = i + len < text.length ? text[i + len] : null;
      const leftOk  = before !== ch;
      const rightOk = after  !== ch;
      if (leftOk && rightOk) {
        // Точное совпадение — удаляем (не добавляем в result)
        i += len;
        continue;
      }
    }
    result += text[i];
    i++;
  }
  return result;
}

// ══════════════════════════════════════
// SYMBOL DETECTION
// ══════════════════════════════════════

// Считает только «точные» вхождения паттерна (аналогично removeExact)
function countPattern(text, pat) {
  const ch = pat[0];
  const allSame = pat.split('').every(c => c === ch);

  if (!allSame) {
    // Разнородный паттерн — считаем все вхождения
    let n = 0, idx = 0;
    while ((idx = text.indexOf(pat, idx)) !== -1) { n++; idx += pat.length; }
    return n;
  }

  // Однородный — считаем только точные (не часть более длинного)
  const len = pat.length;
  let n = 0, i = 0;
  while (i < text.length) {
    if (text.startsWith(pat, i)) {
      const before = i > 0 ? text[i - 1] : null;
      const after  = i + len < text.length ? text[i + len] : null;
      if (before !== ch && after !== ch) n++;
      i += len; // в любом случае прыгаем вперёд
    } else {
      i++;
    }
  }
  return n;
}


function toggleSym(pat) {
  if (removedSet.has(pat)) {
    removedSet.delete(pat);
  } else {
    removedSet.add(pat);
  }
  applyAndShow();
}

function toggleEmoji() {
  removeEmoji = !removeEmoji;
  applyAndShow();
}

// Применяет текущий removedSet к оригиналу и показывает результат
function applyAndShow() {
  // Оригинал — всегда первая запись текущей «сессии» удалений
  ed.value = applyRemovals(originalText);
  renderSymbols();
  updateStats();
}

// Перерисовывает панель символов по оригинальному тексту
function renderSymbols() {
  const found = [];
  for (const pat of DICT) {
    const cnt = countPattern(originalText, pat);
    if (cnt > 0) found.push({ pat, cnt });
  }
  const emojiMatches = originalText.match(EMOJI_RE) || [];
  const emojiCount = emojiMatches.length;

  document.getElementById('sym-n').textContent = found.length + (emojiCount > 0 ? 1 : 0);

  const scroll = document.getElementById('sym-scroll');
  scroll.innerHTML = '';

  if (!found.length && !emojiCount) {
    scroll.innerHTML = '<span class="sym-empty">Не найдено</span>';
    return;
  }

  found.forEach(({ pat, cnt }) => {
    const btn = document.createElement('button');
    btn.className = 's-btn' + (removedSet.has(pat) ? ' gone' : '');
    btn.innerHTML = `<span>${pat}</span><span class="s-n">${cnt}</span>`;
    btn.addEventListener('click', () => toggleSym(pat));
    scroll.appendChild(btn);
  });

  if (emojiCount > 0) {
    const btn = document.createElement('button');
    btn.className = 's-btn emoji-btn' + (removeEmoji ? ' gone' : '');
    btn.innerHTML = `😊<span class="s-n">${emojiCount}</span>`;
    btn.addEventListener('click', toggleEmoji);
    scroll.appendChild(btn);
  }
}

// Возвращает текст «до удалений» — исходный текст текущей сессии
function getRawText() {
  return originalText;
}

// ══════════════════════════════════════
// TAB SWITCH
// ══════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-detect').classList.toggle('active', tab === 'detect');
  document.getElementById('tab-replace').classList.toggle('active', tab === 'replace');
  document.getElementById('sym-scroll').style.display = tab === 'detect' ? 'flex' : 'none';
  document.getElementById('replace-panel').classList.toggle('active', tab === 'replace');
  if (tab === 'detect') render();
}

// ══════════════════════════════════════
// REPLACE LOGIC
// ══════════════════════════════════════
document.getElementById('rp-from').addEventListener('input', updatePairHint);

function updatePairHint() {
  const from = document.getElementById('rp-from').value;
  const hint = document.getElementById('rp-pair-hint');
  const toField = document.getElementById('rp-to');

  if (PAIRS[from]) {
    const label = PAIR_LABELS[from] || `${from} … ${PAIRS[from]}`;
    hint.textContent = `Пара: ${label} — закрывающий символ подставится автоматически`;
    hint.classList.add('visible');
    // Автоподставляем пару в поле «на», если оно пустое или тоже парное
    if (!toField.value || PAIRS[toField.value]) {
      // не трогаем — пользователь сам выберет что заменить на
    }
  } else {
    hint.classList.remove('visible');
  }
}

function doReplace() {
  const from = document.getElementById('rp-from').value;
  const to   = document.getElementById('rp-to').value;
  if (!from) { toast('Введите символ для замены'); return; }

  const before = ed.value;
  let after = before;

  // Основная замена
  after = after.split(from).join(to);

  // Парная замена: если from имеет пару — заменяем и её
  if (PAIRS[from]) {
    const fromClose = PAIRS[from];
    // Пара для «на»: если to тоже открывающий — берём его закрывающий, иначе используем PAIRS[from] → PAIRS[to] или пустую строку
    const toClose = PAIRS[to] || '';
    after = after.split(fromClose).join(toClose);
  }

  if (after === before) { toast('Символ не найден в тексте'); return; }

  saveHist(before);
  ed.value = after;
  saveHist(after);
  removedSet.clear();
  render();

  const cnt = (before.split(from).length - 1);
  const pairMsg = PAIRS[from] ? ' + парный символ' : '';
  toast(`✓ Заменено ${cnt} вхожд.${pairMsg}`);
}

function clearReplace() {
  document.getElementById('rp-from').value = '';
  document.getElementById('rp-to').value = '';
  document.getElementById('rp-pair-hint').classList.remove('visible');
}

// ══════════════════════════════════════
// HISTORY
// ══════════════════════════════════════
function saveHist(val) {
  if (hist[hIdx] === val) return;
  hist = hist.slice(0, hIdx + 1);
  hist.push(val);
  hIdx = hist.length - 1;
  if (hist.length > 150) { hist.shift(); hIdx--; }
}

function setValue(val, addHist = true) {
  if (addHist) saveHist(ed.value);
  ed.value = val;
  if (addHist) saveHist(val);
  ed.scrollTop = 0;
  removedSet.clear();
  render();
}

function doUndo() {
  if (hIdx > 0) { hIdx--; ed.value = hist[hIdx]; removedSet.clear(); render(); }
}
function doRedo() {
  if (hIdx < hist.length - 1) { hIdx++; ed.value = hist[hIdx]; removedSet.clear(); render(); }
}

// ══════════════════════════════════════
// FORMAT CATEGORIES
// ══════════════════════════════════════
const FMT_CATS = {
  spaces: [
    { label: '×2 пробелы',       fn: 'fmt_spaces' },
    { label: 'Неразрывные',       fn: 'fmt_nbsp' },
    { label: 'Обрезать края',     fn: 'fmt_trim' },
  ],
  register: [
    { label: 'АА ВЕРХНИЙ',        fn: 'fmt_upper' },
    { label: 'аа нижний',         fn: 'fmt_lower' },
    { label: 'Аа Каждое Слово',   fn: 'fmt_title' },
    { label: 'Аа предложения',    fn: 'fmt_sentence' },
  ],
  punct: [
    { label: 'Пробел до знака',   fn: 'fmt_space_before' },
    { label: 'Пробел после знака',fn: 'fmt_space_after' },
  ],
  struct: [
    { label: 'Лишние строки',     fn: 'fmt_lines' },
    { label: 'Одна строка',       fn: 'fmt_oneline' },
    { label: 'По предложениям',   fn: 'fmt_sentlines' },
    { label: 'Убрать нумерацию',  fn: 'fmt_denumber' },
  ],
};

let currentFmtCat = 'spaces';

function setFmtCat(cat, btn) {
  currentFmtCat = cat;
  document.querySelectorAll('.fmt-cat').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFmtBtns();
}

function renderFmtBtns() {
  const wrap = document.getElementById('fmt-btns');
  wrap.innerHTML = '';
  FMT_CATS[currentFmtCat].forEach(({ label, fn }) => {
    const b = document.createElement('button');
    b.className = 'f-btn';
    b.textContent = label;
    b.onclick = () => window[fn]();
    wrap.appendChild(b);
  });
}


function fmt_spaces()  { setValue(ed.value.replace(/[ \t]{2,}/g, ' ')); toast('Двойные пробелы убраны'); }
function fmt_lines()   { setValue(ed.value.replace(/\n{3,}/g, '\n\n')); toast('Лишние строки удалены'); }
function fmt_trim()    { setValue(ed.value.split('\n').map(l => l.trim()).join('\n')); toast('Края строк обрезаны'); }
function fmt_upper()   { setValue(ed.value.toUpperCase()); toast('Текст — ВЕРХНИЙ регистр'); }
function fmt_lower()   { setValue(ed.value.toLowerCase()); toast('Текст — нижний регистр'); }

// Каждое слово с заглавной
function fmt_title() {
  setValue(ed.value.replace(/\S+/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase()));
  toast('Аа — каждое слово с заглавной');
}

// Заглавная после . ! ?
function fmt_sentence() {
  const t = ed.value.toLowerCase().replace(/(^|[.!?]\s+)([а-яёa-z])/giu,
    (_, pre, ch) => pre + ch.toUpperCase());
  setValue(t);
  toast('Аа — заглавная в начале предложений');
}

// Убрать пробел ПЕРЕД знаком
function fmt_space_before() {
  setValue(ed.value.replace(/\s+([,\.!?:;])/g, '$1'));
  toast('Пробелы перед знаками убраны');
}

// Добавить пробел ПОСЛЕ знака если его нет
function fmt_space_after() {
  setValue(ed.value.replace(/([,\.!?:;])([^\s\n\d"'»)\]\}])/g, '$1 $2'));
  toast('Пробелы после знаков добавлены');
}

// Неразрывные пробелы → обычные
function fmt_nbsp() {
  const before = ed.value;
  const after = before.replace(/\u00A0/g, ' ');
  const cnt = (before.match(/\u00A0/g) || []).length;
  setValue(after);
  toast(cnt > 0 ? `Заменено ${cnt} неразрывных пробелов` : 'Неразрывных пробелов не найдено');
}

// Весь текст в одну строку
function fmt_oneline() {
  setValue(ed.value.replace(/\n+/g, ' ').replace(/\s{2,}/g, ' ').trim());
  toast('Текст собран в одну строку');
}

// Каждое предложение с новой строки
function fmt_sentlines() {
  setValue(ed.value.replace(/([.!?])\s+/g, '$1\n').trim());
  toast('Каждое предложение на новой строке');
}

// Убрать нумерацию строк (1. 2. 3. и т.д.)
function fmt_denumber() {
  setValue(ed.value.replace(/^\s*\d+[\.\)]\s*/gm, ''));
  toast('Нумерация строк удалена');
}

// ══════════════════════════════════════
// CLIPBOARD
// ══════════════════════════════════════
async function doPaste() {
  closeFileMenu();

  if (navigator.clipboard && location.protocol === 'https:') {
    try {
      const text = await navigator.clipboard.readText();
      setValue(text);
      ed.scrollTop = 0;
      window.scrollTo(0, 0);
      toast(`✓ Вставлено ${text.length} симв.`);
      return;
    } catch {}
  }

  // Fallback: фокус на поле, пользователь вставляет вручную
  ed.focus();
  toast('Нажмите и удерживайте поле → Вставить');
}

async function doCopy() {
  const text = ed.value;
  if (!text.trim()) { toast('Нечего копировать'); return; }

  // Метод 1: современный Clipboard API (работает на https://)
  if (navigator.clipboard && location.protocol === 'https:') {
    try {
      await navigator.clipboard.writeText(text);
      toast(`✓ Скопировано ${text.length} симв.`);
      return;
    } catch {}
  }

  // Метод 2: execCommand (работает везде включая file://)
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (ok) { toast(`✓ Скопировано ${text.length} симв.`); return; }
  } catch {}

  // Метод 3: выделить текст в поле — пользователь копирует вручную
  ed.focus();
  ed.select();
  toast('Выделено — нажмите Копировать на клавиатуре');
}

function doClear() {
  if (!ed.value) return;
  setValue('');
  currentFileName = null;
  fileHandle = null;
  document.getElementById('file-banner').classList.remove('active');
  toast('Поле очищено');
}

// ══════════════════════════════════════
// FILE OPERATIONS
// ══════════════════════════════════════
async function openFile() {
  closeFileMenu();

  // Try modern File System Access API first
  if ('showOpenFilePicker' in window) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'Текстовые файлы', accept: { 'text/plain': ['.txt'] } }]
      });
      fileHandle = handle;
      const file = await handle.getFile();
      const text = await file.text();
      currentFileName = file.name;
      setValue(text);
      showFileBanner(file.name);
      toast(`✓ Открыт: ${file.name}`);
      return;
    } catch (e) {
      if (e.name !== 'AbortError') {
        // Fall through to input fallback
      } else return;
    }
  }

  // Fallback: classic file input
  document.getElementById('file-input').click();
}

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  currentFileName = file.name;
  fileHandle = null;
  setValue(text);
  showFileBanner(file.name);
  toast(`✓ Открыт: ${file.name}`);
  e.target.value = '';
});

async function saveFile() {
  closeFileMenu();
  const text = applyRemovals(ed.value);
  if (!text.trim()) { toast('Нечего сохранять'); return; }

  const fname = currentFileName || 'форматированный.txt';

  // Try File System Access API (save to same file or pick new)
  if ('showSaveFilePicker' in window) {
    try {
      const handle = fileHandle || await window.showSaveFilePicker({
        suggestedName: fname,
        types: [{ description: 'Текстовый файл', accept: { 'text/plain': ['.txt'] } }]
      });
      fileHandle = handle;
      const writable = await handle.createWritable();
      await writable.write(text);
      await writable.close();
      currentFileName = handle.name;
      showFileBanner(handle.name);
      toast(`✓ Сохранено: ${handle.name}`);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }

  // Fallback: download
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = fname;
  a.click();
  URL.revokeObjectURL(url);
  toast(`✓ Скачан: ${fname}`);
}

function showFileBanner(name) {
  document.getElementById('file-name').textContent = name;
  document.getElementById('file-banner').classList.add('active');
}

function closeFile() {
  currentFileName = null;
  fileHandle = null;
  document.getElementById('file-banner').classList.remove('active');
}

// ══════════════════════════════════════
// FILE MENU SHEET
// ══════════════════════════════════════
function openFileMenu() {
  document.getElementById('file-menu').classList.add('open');
  document.getElementById('fm-overlay').classList.add('active');
}
function closeFileMenu() {
  document.getElementById('file-menu').classList.remove('open');
  document.getElementById('fm-overlay').classList.remove('active');
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════
// PWA INSTALL
// ══════════════════════════════════════
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').classList.add('visible');
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('install-btn').classList.remove('visible');
    toast('✓ Приложение установлено!');
  }
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').classList.remove('visible');
});

// ══════════════════════════════════════
// EDITOR EVENTS
// ══════════════════════════════════════
let edTimer;
let wasEmpty = true; // отслеживаем — было ли поле пустым

ed.addEventListener('input', () => {
  // Если вставили в пустое поле — сбрасываем скролл немедленно
  if (wasEmpty && ed.value.length > 0) {
    ed.scrollTop = 0;
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
  }
  wasEmpty = ed.value.length === 0;

  clearTimeout(edTimer);
  edTimer = setTimeout(() => {
    saveHist(ed.value);
    removedSet.clear();
    render();
  }, 350);
});

// Блокируем любой скролл страницы — только textarea скроллится
window.addEventListener('scroll', () => { window.scrollTo(0, 0); }, { passive: false });
document.addEventListener('scroll', e => { e.preventDefault(); }, { passive: false });

// Init
ed.value = '';
renderFmtBtns();
render();
</script>
</body>
</html>
